{% extends 'base.html' %}
{% load static %}

{% block title %}Iniciar Sesión - Alke Wallet{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}" />
{% endblock %}

{% block content %}
<div class="row h-100 align-items-center">
    <div class="col-12 col-lg-5 d-flex align-items-center justify-content-center bg-white px-4">
        <div class="w-100" style="max-width: 400px;">
            <div class="d-flex align-items-center mb-4">
                <img src="{% static 'recursos/Logo-Alke-Wallet.svg' %}" alt="Logo" class="img-fluid me-2" style="height: 40px" />
                <h1 class="mb-0 fs-2">Alke Wallet</h1>
            </div>

            <form method="POST" action="{% url 'login' %}" id="login">
                {% csrf_token %} <div class="mb-3">
                    <label for="email" class="form-label small fw-bold">Correo Electrónico</label>
                    <input type="email" class="form-control py-2" id="email" name="username" placeholder="ejemplo@correo.com" required />
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label small fw-bold">Contraseña</label>
                    <input type="password" class="form-control py-2" id="password" name="password" placeholder="Ingresar Contraseña" required />
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary py-2">Iniciar sesión</button>
                </div>
            </form>
        </div>
    </div>

    <div class="col-lg-7 d-none d-lg-block p-0" 
         style="background-image: url('https://wallpapers.com/images/featured/minimalista-verde-yb2hvth6ejp1k4dg.jpg'); 
                background-size: cover; 
                background-position: center; 
                min-height: 100vh;">
    </div>
</div>
{% endblock %}
