{% extends 'base.html' %}
{% load static %}

{% block title %}Enviar Dinero - Alke Wallet{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex mb-4">
        <a href="{% url 'menu' %}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2>Enviar Dinero</h2>
    </div>

    <div class="card card-body shadow-sm border-0 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="h5 mb-0">Seleccionar Contacto</h3>
            <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#modalContacto">
                <i class="bi bi-person-plus"></i> Nuevo Contacto
            </button>
        </div>

        <form method="POST" action="{% url 'send_money' %}">
            {% csrf_token %}
            <div class="mb-3">
                <select id="lista-contactos-select" name="contacto" class="form-select form-select-lg" required>
                    <option value="">Seleccione un contacto...</option>
                    </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Monto a enviar:</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" name="monto" id="monto-enviar" placeholder="0" class="form-control form-control-lg" required>
                </div>
            </div>

            <div class="d-flex justify-content-between gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg flex-grow-1">Realizar envío</button>
                <a class="btn btn-secondary btn-lg" href="{% url 'menu' %}">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="modalContacto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Agregar Nuevo Contacto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" id="nombre-contacto" class="form-control" placeholder="Ej: Juan Pérez">
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo o Cuenta</label>
                    <input type="text" id="id-contacto" class="form-control" placeholder="juan@correo.com">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary" id="btn-guardar-contacto">Guardar</button>
            </div>
        </div>
    </div>
</div>

<div id="mensaje-redireccion" class="alert d-none mt-2" role="status"></div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/sendmoney.js' %}"></script>
{% endblock %}
